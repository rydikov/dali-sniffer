<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 Wi-Fi Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="chrome">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="pill"></div>
        <div class="badge" id="ws-state">offline</div>
      </div>
      <div class="title">
        <strong>Wi-Fi Console</strong>
        <span>ESP32 shared status stream</span>
      </div>
    </header>
    <main class="messages" id="messages"></main>
    <footer class="composer">
      <form id="command-form">
        <label class="input-wrap">
          <span>✦</span>
          <input id="command-input" type="text" maxlength="120" placeholder="Send a command" autocomplete="off">
        </label>
        <button id="send-button" type="submit">Send</button>
      </form>
      <div class="footer-note">
        <span>WebSocket: <code>/ws</code></span>
        <span>Updates every 5s</span>
      </div>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
