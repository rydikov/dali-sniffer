<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 Wi-Fi Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <section class="shell">
    <header class="topbar">
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="ws-state">Offline</span>
      </div>
      <div class="actions" aria-hidden="true">
        <button class="icon-button" type="button" tabindex="-1">||</button>
        <button class="icon-button" type="button" tabindex="-1">⌫</button>
      </div>
    </header>
    <main class="messages" id="messages"></main>
    <footer class="composer">
      <form id="command-form">
        <label class="input-wrap">
          <input id="command-input" type="text" maxlength="120" placeholder="/ping" autocomplete="off">
        </label>
        <button id="send-button" type="submit">Send</button>
      </form>
    </footer>
  </section>
  <script src="/app.js"></script>
</body>
</html>
