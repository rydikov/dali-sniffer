<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Wi-Fi Console</title>
  <script type="module" crossorigin src="/assets/app.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/app.css">
</head>
<body>
  <section class="shell">
    <header class="topbar">
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="ws-state">Offline</span>
      </div>
      <div class="actions">
        <button class="icon-button" id="pause-button" type="button" aria-label="Pause updates" title="Pause updates">
          <svg class="w-[18px] h-[18px] text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 6H8a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1Zm7 0h-1a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1Z"/>
          </svg>
        </button>
        <button class="icon-button" id="clear-button" type="button" aria-label="Clear chat" title="Clear chat">
          <svg class="w-[18px] h-[18px] text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 7h14m-9 3v8m4-8v8M10 3h4a1 1 0 0 1 1 1v3H9V4a1 1 0 0 1 1-1ZM6 7h12v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7Z"/>
          </svg>
        </button>
      </div>
    </header>
    <main class="messages" id="messages"></main>
    <footer class="composer">
      <form id="command-form">
        <label class="input-wrap">
          <span class="input-ghost" id="command-ghost" aria-hidden="true"></span>
          <input id="command-input" type="text" maxlength="120" placeholder="Enter command" autocomplete="off">
        </label>
        <button id="send-button" type="submit" aria-label="Send command">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24">
            <path fill="currentColor" d="M21.8 3.6a1 1 0 0 0-1.08-.2L3.72 10.7a1 1 0 0 0 .08 1.87l6.93 2.52 2.52 6.93a1 1 0 0 0 .89.66h.05a1 1 0 0 0 .92-.58l7.3-17a1 1 0 0 0-.2-1.1ZM5.99 11.58l12.94-5.55-7.29 7.29-5.65-1.74Zm8.44 7.36-1.74-5.65 7.29-7.29-5.55 12.94Z"/>
          </svg>
          <span>Send</span>
        </button>
      </form>
    </footer>
  </section>
</body>
</html>
